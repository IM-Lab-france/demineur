name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: composer install --no-interaction --prefer-dist
      - run: php tests/server_unit.php
      - run: php tests/game_outcome_test.php
      - run: php -l server.php && php -l index.php
      - run: node --check script.js && node --check scores.js
      - run: bash -n scripts/*.sh
