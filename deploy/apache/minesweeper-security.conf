<Directory /var/www/demineur>
    Options -Indexes
    AllowOverride All
    Require all granted

    <FilesMatch "(^\.|\.env$|\.sql$|\.json$|\.lock$|\.log$|\.pid$|\.pkl$|composer\.(json|lock)$)">
        Require all denied
    </FilesMatch>
</Directory>

<Directory /var/www/demineur/.git>
    Require all denied
</Directory>

<Directory /var/www/demineur/install>
    Require all denied
</Directory>

<LocationMatch "^/ia/deminium/plugins/.*/(?:logs/|pid$|memory\.pkl$)">
    Require all denied
</LocationMatch>

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set X-Frame-Options "DENY"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
</IfModule>
