<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ws-url" content="">
    <title>Scores des Joueurs</title>
    <link href="/assets/vendor/bootstrap/4.5.2/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- Style commun -->
    <!-- Ajout du favicon -->
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
</head>
<body>

    <!-- Inclusion du menu commun -->
    <nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="scores.html">Scores</a>
                </li>
                <li class="nav-item">
                    <a id="logoutLink" class="nav-link text-danger" href="#">Déconnexion</a>
                </li>
            </ul>
        </div>
        <span id="welcomeMessage" class="navbar-text ml-auto pr-3">Bienvenue, <span id="navbarUserDisplay"></span></span>
    </nav>

    
    <div id="scoresContainer" class="container text-center mt-5">
        <h2>Scores des Joueurs</h2>
        <div class="form-group mx-auto" id="rankingPeriodGroup">
            <label for="rankingPeriod">Période</label>
            <select id="rankingPeriod" class="form-control">
                <option value="all">Classement général</option>
                <option value="month">30 derniers jours</option>
                <option value="week">7 derniers jours</option>
            </select>
        </div>
        <div class="form-group">
            <div class="table-responsive"><table class="table table-striped table-hover table-bordered" id="scoresTableContainer">
                <thead class="thead-dark">
                    <tr>
                        <th>Joueur</th>
                        <th>Parties Jouées</th>
                        <th>Parties Gagnées</th>
                        <th>Défaites</th>
                        <th>Égalités</th>
                        <th>Points</th>
                        <th>Pourcentage de Victoires</th>
                    </tr>
                </thead>
                <tbody id="scoresTable">
                    <!-- Les scores des joueurs seront affichés ici -->
                </tbody>
            </table></div>
        </div>
    </div>
    
    <script defer src="/assets/vendor/jquery/jquery-3.5.1.slim.min.js"></script>
    <script defer src="/assets/vendor/bootstrap/4.5.2/bootstrap.bundle.min.js"></script>
    <script defer src="scores.js"></script> <!-- Script spécifique pour gérer les scores -->
</body>
</html>
